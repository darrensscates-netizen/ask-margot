<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle - warm brown -->
  <circle cx="256" cy="256" r="256" fill="#5C3D1E"/>

  <!-- Subtle paw print watermark in background -->
  <circle cx="256" cy="256" r="200" fill="#6B4A28" opacity="0.3"/>

  <!-- Dog body -->
  <ellipse cx="256" cy="340" rx="130" ry="95" fill="#8B5E3C"/>

  <!-- Head -->
  <ellipse cx="256" cy="210" rx="105" ry="95" fill="#9B6E4C"/>

  <!-- Left ear (floppy) -->
  <ellipse cx="162" cy="228" rx="48" ry="72" fill="#6B3F1A" transform="rotate(-15 162 228)"/>

  <!-- Right ear (floppy) -->
  <ellipse cx="350" cy="228" rx="48" ry="72" fill="#6B3F1A" transform="rotate(15 350 228)"/>

  <!-- Snout area -->
  <ellipse cx="256" cy="242" rx="62" ry="50" fill="#C4956A"/>

  <!-- Nose -->
  <ellipse cx="256" cy="218" rx="28" ry="20" fill="#2A1A0A"/>
  <!-- Nose highlight -->
  <ellipse cx="248" cy="213" rx="8" ry="5" fill="#3D2210" opacity="0.6"/>

  <!-- Left eye -->
  <circle cx="210" cy="185" r="22" fill="#2A1A0A"/>
  <circle cx="218" cy="179" r="8" fill="white"/>
  <circle cx="221" cy="177" r="4" fill="white"/>

  <!-- Right eye -->
  <circle cx="302" cy="185" r="22" fill="#2A1A0A"/>
  <circle cx="310" cy="179" r="8" fill="white"/>
  <circle cx="313" cy="177" r="4" fill="white"/>

  <!-- Smile / mouth -->
  <path d="M 228 262 Q 256 282 284 262" stroke="#5C3010" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="256" cy="280" rx="22" ry="18" fill="#E07070"/>
  <line x1="256" y1="270" x2="256" y2="295" stroke="#C05050" stroke-width="3"/>

  <!-- Collar -->
  <rect x="178" y="288" width="156" height="22" rx="11" fill="#C8892A"/>
  <!-- Collar tag -->
  <circle cx="256" cy="299" r="14" fill="#F0C060"/>
  <text x="256" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#5C3D1E" font-family="Arial">M</text>

  <!-- Tail (curving up to right) -->
  <path d="M 374 320 Q 420 280 410 230 Q 400 195 430 180" stroke="#8B5E3C" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- Front left paw -->
  <ellipse cx="196" cy="415" rx="30" ry="20" fill="#7B4A1E"/>
  <!-- Paw toes -->
  <circle cx="180" cy="408" r="10" fill="#6B3A14"/>
  <circle cx="196" cy="405" r="10" fill="#6B3A14"/>
  <circle cx="212" cy="408" r="10" fill="#6B3A14"/>

  <!-- Front right paw -->
  <ellipse cx="316" cy="415" rx="30" ry="20" fill="#7B4A1E"/>
  <circle cx="300" cy="408" r="10" fill="#6B3A14"/>
  <circle cx="316" cy="405" r="10" fill="#6B3A14"/>
  <circle cx="332" cy="408" r="10" fill="#6B3A14"/>
</svg>
